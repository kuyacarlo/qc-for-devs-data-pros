# Base pre-commit configuration for generic files
# Suitable for any repository to ensure basic hygiene.

repos:
  # Standard out-of-the-box hooks from pre-commit
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        description: Trims trailing whitespace from text files.
      - id: end-of-file-fixer
        description: Ensures files end with a newline.
      - id: check-yaml
        description: Validates YAML syntax.
      - id: check-toml
        description: Validates TOML syntax.
      - id: check-json
        description: Validates JSON syntax.
      - id: check-added-large-files
        description: Prevents giant files (>500KB) from being committed.
        args: ['--maxkb=500']

  # Gitleaks: Prevent committing credentials and secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: Gitleaks Secrets Scan
        description: Detects secrets (API keys, passwords, tokens) before they are committed.
